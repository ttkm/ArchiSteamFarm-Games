name: Build and Publish
 
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ created ]
 
jobs:
  build:
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout
        uses: actions/checkout@v4
 
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
 
      - name: Restore dependencies
        run: dotnet restore
 
      - name: Build
        run: dotnet build --configuration Release --no-restore
 
      - name: Publish linux-arm64
        run: dotnet publish -c Release -r linux-arm64 --self-contained false -o ./publish/linux-arm64
 
      - name: Publish linux-arm
        run: dotnet publish -c Release -r linux-arm --self-contained false -o ./publish/linux-arm
 
      - name: Upload linux-arm64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: FreeGamesMonitor-linux-arm64
          path: ./publish/linux-arm64
 
      - name: Upload linux-arm artifact
        uses: actions/upload-artifact@v4
        with:
          name: FreeGamesMonitor-linux-arm
          path: ./publish/linux-arm
 
  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
 
    steps:
      - name: Checkout
        uses: actions/checkout@v4
 
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
 
      - name: Publish linux-arm64
        run: dotnet publish -c Release -r linux-arm64 --self-contained false -o ./publish/linux-arm64
 
      - name: Zip linux-arm64
        run: zip -r FreeGamesMonitor-linux-arm64.zip ./publish/linux-arm64
 
      - name: Publish linux-arm
        run: dotnet publish -c Release -r linux-arm --self-contained false -o ./publish/linux-arm
 
      - name: Zip linux-arm
        run: zip -r FreeGamesMonitor-linux-arm.zip ./publish/linux-arm
 
      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            FreeGamesMonitor-linux-arm64.zip
            FreeGamesMonitor-linux-arm.zip